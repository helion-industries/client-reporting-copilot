<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register · Client Reporting Copilot</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell shell-center">
      <section class="auth-card card">
        <div class="badge">New workspace</div>
        <h1>Create your agency account</h1>
        <p class="auth-copy">Set up your reporting workspace, add clients, and generate polished monthly reports faster.</p>
        <form id="register-form" class="auth-form">
          <label>Agency name <input type="text" name="agencyName" required /></label>
          <label>Email <input type="email" name="email" required /></label>
          <label>Password <input type="password" name="password" required /></label>
          <div class="auth-actions">
            <button type="submit">Create account</button>
            <a class="button-link button-link-secondary" href="/login.html">Already have an account</a>
          </div>
        </form>
        <p class="auth-footer">Already set up? <a href="/login.html">Log in here</a>.</p>
        <pre id="status" class="status-box"></pre>
      </section>
    </main>
    <script>
      const form = document.getElementById('register-form');
      const status = document.getElementById('status');

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        status.textContent = 'Creating account…';
        const payload = Object.fromEntries(new FormData(form).entries());

        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        const body = await response.json();

        if (!response.ok) {
          status.textContent = body.error || 'Registration failed';
          return;
        }

        localStorage.setItem('token', body.token);

        // If a plan was passed in the URL, go straight to checkout
        const params = new URLSearchParams(window.location.search);
        const plan = params.get('plan');
        if (plan && ['starter', 'growth', 'agency'].includes(plan)) {
          status.textContent = 'Account created! Taking you to checkout…';
          const checkoutRes = await fetch('/api/billing/create-checkout-session', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${body.token}`,
            },
            body: JSON.stringify({ plan_id: plan }),
          });
          const checkoutBody = await checkoutRes.json();
          if (checkoutRes.ok && checkoutBody.url) {
            window.location.href = checkoutBody.url;
            return;
          }
        }

        window.location.href = '/dashboard.html';
      });
    </script>
  </body>
</html>
