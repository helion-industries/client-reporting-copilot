<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log in · Client Reporting Copilot</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell shell-center">
      <section class="auth-card card">
        <div class="badge">Welcome back</div>
        <h1>Log in to your reporting workspace</h1>
        <p class="auth-copy">Access clients, imports, generated reports, and share links from one dashboard.</p>
        <form id="login-form" class="auth-form">
          <label>Email <input type="email" name="email" required /></label>
          <label>Password <input type="password" name="password" required /></label>
          <div class="auth-actions">
            <button type="submit">Log in</button>
            <a class="button-link button-link-secondary" href="/register.html">Create account</a>
          </div>
        </form>
        <p class="auth-footer">Need a new workspace? <a href="/register.html">Register your agency</a>.</p>
        <pre id="status" class="status-box"></pre>
      </section>
    </main>
    <script>
      const form = document.getElementById('login-form');
      const status = document.getElementById('status');

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        status.textContent = 'Logging in…';
        const payload = Object.fromEntries(new FormData(form).entries());

        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        const body = await response.json();

        if (!response.ok) {
          status.textContent = body.error || 'Login failed';
          return;
        }

        localStorage.setItem('token', body.token);
        window.location.href = '/dashboard.html';
      });
    </script>
  </body>
</html>
