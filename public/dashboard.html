<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .client-card {
        border: 1px solid #ddd;
        border-radius: 10px;
        padding: 1rem;
        margin-bottom: 1rem;
      }
      .client-card h3,
      .client-card h4,
      .client-card h5 {
        margin: 0 0 0.5rem;
      }
      .import-list,
      .report-list {
        margin-top: 0.75rem;
        padding-left: 1rem;
      }
      .import-actions,
      .report-actions {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-top: 0.5rem;
      }
      .stack {
        display: grid;
        gap: 0.5rem;
        margin-top: 0.75rem;
      }
      textarea {
        width: 100%;
        min-height: 120px;
      }
      .report-section {
        margin-top: 0.75rem;
        padding: 0.75rem;
        border: 1px solid #eee;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <main class="card wide">
      <h1>Agency dashboard</h1>
      <form id="client-form" class="inline-form">
        <input type="text" name="name" placeholder="Client name" required />
        <input type="text" name="industry" placeholder="Industry" />
        <button type="submit">Add client</button>
      </form>
      <button id="refresh-btn" type="button">Refresh clients</button>
      <div id="client-list"></div>
      <pre id="status"></pre>
    </main>
    <script>
      const token = localStorage.getItem('token');
      const status = document.getElementById('status');
      const list = document.getElementById('client-list');
      const form = document.getElementById('client-form');
      const refreshBtn = document.getElementById('refresh-btn');

      if (!token) {
        window.location.href = '/login.html';
      }

      async function authFetch(path, options = {}) {
        return fetch(path, {
          ...options,
          headers: {
            Authorization: `Bearer ${token}`,
            ...(options.headers || {}),
          },
        });
      }

      async function api(path, options = {}) {
        const response = await authFetch(path, options);

        if (response.status === 204) {
          return { ok: true, status: response.status, body: null };
        }

        const body = await response.json();
        return { ok: response.ok, status: response.status, body };
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;');
      }

      function renderImports(client, imports) {
        if (!imports.length) {
          return '<p>No imports yet.</p>';
        }

        return `
          <ul class="import-list">
            ${imports
              .map(
                (item) => `
                  <li>
                    <strong>${item.period}</strong>
                    — ${item.source_type}
                    — ${item.row_count} rows
                    <div class="import-actions">
                      <button type="button" data-action="view-import" data-client-id="${client.id}" data-import-id="${item.id}">View</button>
                      <button type="button" data-action="generate-report" data-client-id="${client.id}" data-import-id="${item.id}" data-period="${item.period}">Generate report</button>
                      <button type="button" data-action="delete-import" data-client-id="${client.id}" data-import-id="${item.id}">Delete</button>
                    </div>
                  </li>
                `
              )
              .join('')}
          </ul>
        `;
      }

      function renderReports(client, reports) {
        if (!reports.length) {
          return '<p>No reports yet.</p>';
        }

        return `
          <ul class="report-list">
            ${reports
              .map(
                (item) => `
                  <li>
                    <strong>${item.period}</strong>
                    — status: ${item.status}
                    <div class="report-actions">
                      <button type="button" data-action="view-report" data-client-id="${client.id}" data-report-id="${item.id}">View</button>
                      <button type="button" data-action="preview-report" data-client-id="${client.id}" data-report-id="${item.id}">Preview</button>
                      <button type="button" data-action="download-pdf" data-client-id="${client.id}" data-report-id="${item.id}">Download PDF</button>
                      <button type="button" data-action="create-share-link" data-client-id="${client.id}" data-report-id="${item.id}">Create share link</button>
                      <button type="button" data-action="generate-email-draft" data-client-id="${client.id}" data-report-id="${item.id}">Generate email draft</button>
                      <button type="button" data-action="delete-report" data-client-id="${client.id}" data-report-id="${item.id}">Delete</button>
                    </div>
                  </li>
                `
              )
              .join('')}
          </ul>
        `;
      }

      function renderReportEditor(report) {
        const sections = Object.entries(report.sections || {})
          .map(
            ([key, section]) => `
              <div class="report-section">
                <h5>${escapeHtml(section.title || key)}</h5>
                <textarea data-section-key="${key}">${escapeHtml(section.content || '')}</textarea>
              </div>
            `
          )
          .join('');

        return `
          <div>
            <h3>Report #${report.id} — ${escapeHtml(report.period)}</h3>
            <p>Status: ${escapeHtml(report.status)}</p>
            ${sections}
            <div class="report-actions">
              <button type="button" data-action="save-report" data-client-id="${report.client_id}" data-report-id="${report.id}">Save edits</button>
            </div>
            <div class="stack export-tools">
              <label>
                Share link
                <textarea data-output="share-link" readonly placeholder="Create a share link to display it here."></textarea>
              </label>
              <label>
                Email draft
                <textarea data-output="email-draft" readonly placeholder="Generate an email draft to display it here."></textarea>
              </label>
            </div>
          </div>
        `;
      }

      async function loadClients() {
        const result = await api('/api/clients');

        if (!result.ok) {
          status.textContent = result.body.error || 'Failed to load clients';
          return;
        }

        list.innerHTML = '';

        for (const client of result.body.clients) {
          const [importsResult, reportsResult] = await Promise.all([
            api(`/api/clients/${client.id}/imports`),
            api(`/api/clients/${client.id}/reports`),
          ]);
          const imports = importsResult.ok ? importsResult.body.imports : [];
          const reports = reportsResult.ok ? reportsResult.body.reports : [];

          const item = document.createElement('section');
          item.className = 'client-card';
          item.innerHTML = `
            <h3>${client.name}</h3>
            <p>${client.industry ? client.industry : 'No industry set'}</p>
            <div class="stack">
              <form data-form="csv-import" data-client-id="${client.id}" enctype="multipart/form-data">
                <input type="text" name="period" placeholder="Period (e.g. 2026-03)" required />
                <input type="file" name="file" accept=".csv,text/csv" required />
                <button type="submit">Upload CSV</button>
              </form>
              <form data-form="gsheets-import" data-client-id="${client.id}">
                <input type="text" name="period" placeholder="Period (e.g. March 2026)" required />
                <input type="url" name="sheetsUrl" placeholder="Public Google Sheets URL" required />
                <button type="submit">Import Google Sheet</button>
              </form>
            </div>
            <h4>Imports</h4>
            ${renderImports(client, imports)}
            <h4>Reports</h4>
            ${renderReports(client, reports)}
            <div class="report-viewer"></div>
          `;
          list.appendChild(item);
        }

        status.textContent = `${result.body.clients.length} active client(s)`;
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        const payload = Object.fromEntries(new FormData(form).entries());

        const result = await api('/api/clients', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(payload),
        });

        if (!result.ok) {
          status.textContent = result.body.error || 'Failed to add client';
          return;
        }

        form.reset();
        await loadClients();
      });

      list.addEventListener('submit', async (event) => {
        const formEl = event.target;
        const clientId = formEl.dataset.clientId;
        if (!clientId) return;

        event.preventDefault();

        if (formEl.dataset.form === 'csv-import') {
          const formData = new FormData(formEl);
          const result = await api(`/api/clients/${clientId}/imports/csv`, {
            method: 'POST',
            body: formData,
          });

          if (!result.ok) {
            status.textContent = result.body.error || 'Failed to upload CSV';
            return;
          }

          formEl.reset();
          status.textContent = `CSV imported for period ${result.body.import.period}`;
          await loadClients();
          return;
        }

        if (formEl.dataset.form === 'gsheets-import') {
          const payload = Object.fromEntries(new FormData(formEl).entries());
          const result = await api(`/api/clients/${clientId}/imports/gsheets`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify(payload),
          });

          if (!result.ok) {
            status.textContent = result.body.error || 'Failed to import Google Sheet';
            return;
          }

          formEl.reset();
          status.textContent = `Google Sheet imported for period ${result.body.import.period}`;
          await loadClients();
        }
      });

      list.addEventListener('click', async (event) => {
        const button = event.target.closest('button[data-action]');
        if (!button) return;

        const clientId = button.dataset.clientId;
        const importId = button.dataset.importId;
        const reportId = button.dataset.reportId;
        const clientCard = button.closest('.client-card');
        const reportViewer = clientCard ? clientCard.querySelector('.report-viewer') : null;

        if (button.dataset.action === 'view-import') {
          const result = await api(`/api/clients/${clientId}/imports/${importId}`);
          status.textContent = result.ok
            ? JSON.stringify(result.body.import, null, 2)
            : result.body.error || 'Failed to load import';
        }

        if (button.dataset.action === 'generate-report') {
          const result = await api(`/api/clients/${clientId}/reports/generate`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              import_id: Number(importId),
              period: button.dataset.period,
            }),
          });

          if (!result.ok) {
            status.textContent = result.body.error || 'Failed to generate report';
            return;
          }

          status.textContent = `Report generated with status ${result.body.report.status}`;
          if (reportViewer) {
            reportViewer.innerHTML = renderReportEditor(result.body.report);
          }
          await loadClients();
        }

        if (button.dataset.action === 'view-report') {
          const result = await api(`/api/clients/${clientId}/reports/${reportId}`);
          if (!result.ok) {
            status.textContent = result.body.error || 'Failed to load report';
            return;
          }

          if (reportViewer) {
            reportViewer.innerHTML = renderReportEditor(result.body.report);
          }
          status.textContent = `Loaded report ${reportId}`;
        }

        if (button.dataset.action === 'preview-report') {
          const response = await authFetch(`/api/clients/${clientId}/reports/${reportId}/preview`);
          if (!response.ok) {
            const body = await response.json();
            status.textContent = body.error || 'Failed to load preview';
            return;
          }

          const html = await response.text();
          const previewWindow = window.open('', '_blank', 'noopener');
          if (previewWindow) {
            previewWindow.document.open();
            previewWindow.document.write(html);
            previewWindow.document.close();
          }
          status.textContent = `Opened preview for report ${reportId}`;
        }

        if (button.dataset.action === 'download-pdf') {
          const response = await authFetch(`/api/clients/${clientId}/reports/${reportId}/pdf`);
          if (!response.ok) {
            const body = await response.json();
            status.textContent = body.error || 'Failed to download PDF';
            return;
          }

          const blob = await response.blob();
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.href = url;
          link.download = `report-${reportId}.pdf`;
          document.body.appendChild(link);
          link.click();
          link.remove();
          URL.revokeObjectURL(url);
          status.textContent = `Started PDF download for report ${reportId}`;
        }

        if (button.dataset.action === 'create-share-link') {
          if (reportViewer && !reportViewer.querySelector('[data-output="share-link"]')) {
            const reportResult = await api(`/api/clients/${clientId}/reports/${reportId}`);
            if (reportResult.ok) {
              reportViewer.innerHTML = renderReportEditor(reportResult.body.report);
            }
          }

          const result = await api(`/api/clients/${clientId}/reports/${reportId}/share`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({}),
          });

          if (!result.ok) {
            status.textContent = result.body.error || 'Failed to create share link';
            return;
          }

          const output = reportViewer ? reportViewer.querySelector('[data-output="share-link"]') : null;
          if (output) {
            output.value = result.body.share_link.url;
          }
          status.textContent = 'Share link created';
        }

        if (button.dataset.action === 'generate-email-draft') {
          if (reportViewer && !reportViewer.querySelector('[data-output="email-draft"]')) {
            const reportResult = await api(`/api/clients/${clientId}/reports/${reportId}`);
            if (reportResult.ok) {
              reportViewer.innerHTML = renderReportEditor(reportResult.body.report);
            }
          }

          const result = await api(`/api/clients/${clientId}/reports/${reportId}/email-draft`);
          if (!result.ok) {
            status.textContent = result.body.error || 'Failed to generate email draft';
            return;
          }

          const emailOutput = reportViewer ? reportViewer.querySelector('[data-output="email-draft"]') : null;
          const shareOutput = reportViewer ? reportViewer.querySelector('[data-output="share-link"]') : null;
          if (emailOutput) {
            emailOutput.value = result.body.email_draft.body;
          }
          if (shareOutput) {
            shareOutput.value = result.body.email_draft.share_url;
          }
          status.textContent = 'Email draft generated';
        }

        if (button.dataset.action === 'save-report') {
          const sections = {};
          for (const textarea of reportViewer.querySelectorAll('textarea[data-section-key]')) {
            const key = textarea.dataset.sectionKey;
            const sectionEl = textarea.closest('.report-section');
            sections[key] = {
              title: sectionEl ? sectionEl.querySelector('h5').textContent : key,
              content: textarea.value,
            };
          }

          const result = await api(`/api/clients/${clientId}/reports/${reportId}`, {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ sections, status: 'edited' }),
          });

          if (!result.ok) {
            status.textContent = result.body.error || 'Failed to save report';
            return;
          }

          status.textContent = `Saved report ${reportId}`;
          if (reportViewer) {
            reportViewer.innerHTML = renderReportEditor(result.body.report);
          }
          await loadClients();
        }

        if (button.dataset.action === 'delete-import') {
          const result = await api(`/api/clients/${clientId}/imports/${importId}`, {
            method: 'DELETE',
          });

          if (!result.ok) {
            status.textContent = result.body.error || 'Failed to delete import';
            return;
          }

          status.textContent = 'Import deleted';
          await loadClients();
        }

        if (button.dataset.action === 'delete-report') {
          const result = await api(`/api/clients/${clientId}/reports/${reportId}`, {
            method: 'DELETE',
          });

          if (!result.ok) {
            status.textContent = result.body.error || 'Failed to delete report';
            return;
          }

          if (reportViewer) {
            reportViewer.innerHTML = '';
          }
          status.textContent = 'Report deleted';
          await loadClients();
        }
      });

      refreshBtn.addEventListener('click', loadClients);
      loadClients();
    </script>
  </body>
</html>
