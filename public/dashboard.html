<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .client-card {
        border: 1px solid #ddd;
        border-radius: 10px;
        padding: 1rem;
        margin-bottom: 1rem;
      }
      .client-card h3 {
        margin: 0 0 0.5rem;
      }
      .import-list {
        margin-top: 0.75rem;
        padding-left: 1rem;
      }
      .import-actions {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-top: 0.5rem;
      }
      .stack {
        display: grid;
        gap: 0.5rem;
        margin-top: 0.75rem;
      }
    </style>
  </head>
  <body>
    <main class="card wide">
      <h1>Agency dashboard</h1>
      <form id="client-form" class="inline-form">
        <input type="text" name="name" placeholder="Client name" required />
        <input type="text" name="industry" placeholder="Industry" />
        <button type="submit">Add client</button>
      </form>
      <button id="refresh-btn" type="button">Refresh clients</button>
      <div id="client-list"></div>
      <pre id="status"></pre>
    </main>
    <script>
      const token = localStorage.getItem('token');
      const status = document.getElementById('status');
      const list = document.getElementById('client-list');
      const form = document.getElementById('client-form');
      const refreshBtn = document.getElementById('refresh-btn');

      if (!token) {
        window.location.href = '/login.html';
      }

      async function api(path, options = {}) {
        const response = await fetch(path, {
          ...options,
          headers: {
            Authorization: `Bearer ${token}`,
            ...(options.headers || {}),
          },
        });

        if (response.status === 204) {
          return { ok: true, status: response.status, body: null };
        }

        const body = await response.json();
        return { ok: response.ok, status: response.status, body };
      }

      function renderImports(client, imports) {
        if (!imports.length) {
          return '<p>No imports yet.</p>';
        }

        return `
          <ul class="import-list">
            ${imports
              .map(
                (item) => `
                  <li>
                    <strong>${item.period}</strong>
                    — ${item.source_type}
                    — ${item.row_count} rows
                    <div class="import-actions">
                      <button type="button" data-action="view-import" data-client-id="${client.id}" data-import-id="${item.id}">View</button>
                      <button type="button" data-action="delete-import" data-client-id="${client.id}" data-import-id="${item.id}">Delete</button>
                    </div>
                  </li>
                `
              )
              .join('')}
          </ul>
        `;
      }

      async function loadClients() {
        const result = await api('/api/clients');

        if (!result.ok) {
          status.textContent = result.body.error || 'Failed to load clients';
          return;
        }

        list.innerHTML = '';

        for (const client of result.body.clients) {
          const importsResult = await api(`/api/clients/${client.id}/imports`);
          const imports = importsResult.ok ? importsResult.body.imports : [];

          const item = document.createElement('section');
          item.className = 'client-card';
          item.innerHTML = `
            <h3>${client.name}</h3>
            <p>${client.industry ? client.industry : 'No industry set'}</p>
            <div class="stack">
              <form data-form="csv-import" data-client-id="${client.id}" enctype="multipart/form-data">
                <input type="text" name="period" placeholder="Period (e.g. 2026-03)" required />
                <input type="file" name="file" accept=".csv,text/csv" required />
                <button type="submit">Upload CSV</button>
              </form>
              <form data-form="gsheets-import" data-client-id="${client.id}">
                <input type="text" name="period" placeholder="Period (e.g. March 2026)" required />
                <input type="url" name="sheetsUrl" placeholder="Public Google Sheets URL" required />
                <button type="submit">Import Google Sheet</button>
              </form>
            </div>
            <h4>Imports</h4>
            ${renderImports(client, imports)}
          `;
          list.appendChild(item);
        }

        status.textContent = `${result.body.clients.length} active client(s)`;
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        const payload = Object.fromEntries(new FormData(form).entries());

        const result = await api('/api/clients', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(payload),
        });

        if (!result.ok) {
          status.textContent = result.body.error || 'Failed to add client';
          return;
        }

        form.reset();
        await loadClients();
      });

      list.addEventListener('submit', async (event) => {
        const formEl = event.target;
        const clientId = formEl.dataset.clientId;
        if (!clientId) return;

        event.preventDefault();

        if (formEl.dataset.form === 'csv-import') {
          const formData = new FormData(formEl);
          const result = await api(`/api/clients/${clientId}/imports/csv`, {
            method: 'POST',
            body: formData,
          });

          if (!result.ok) {
            status.textContent = result.body.error || 'Failed to upload CSV';
            return;
          }

          formEl.reset();
          status.textContent = `CSV imported for period ${result.body.import.period}`;
          await loadClients();
          return;
        }

        if (formEl.dataset.form === 'gsheets-import') {
          const payload = Object.fromEntries(new FormData(formEl).entries());
          const result = await api(`/api/clients/${clientId}/imports/gsheets`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify(payload),
          });

          if (!result.ok) {
            status.textContent = result.body.error || 'Failed to import Google Sheet';
            return;
          }

          formEl.reset();
          status.textContent = `Google Sheet imported for period ${result.body.import.period}`;
          await loadClients();
        }
      });

      list.addEventListener('click', async (event) => {
        const button = event.target.closest('button[data-action]');
        if (!button) return;

        const clientId = button.dataset.clientId;
        const importId = button.dataset.importId;

        if (button.dataset.action === 'view-import') {
          const result = await api(`/api/clients/${clientId}/imports/${importId}`);
          if (!result.ok) {
            status.textContent = result.body.error || 'Failed to load import';
            return;
          }

          status.textContent = JSON.stringify(result.body.import, null, 2);
        }

        if (button.dataset.action === 'delete-import') {
          const result = await api(`/api/clients/${clientId}/imports/${importId}`, {
            method: 'DELETE',
          });

          if (!result.ok) {
            status.textContent = result.body.error || 'Failed to delete import';
            return;
          }

          status.textContent = 'Import deleted';
          await loadClients();
        }
      });

      refreshBtn.addEventListener('click', loadClients);
      loadClients();
    </script>
  </body>
</html>
