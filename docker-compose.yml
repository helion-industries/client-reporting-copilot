services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      JWT_SECRET: change-me
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      DB_PATH: /app/data/app.db
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
    volumes:
      - ./data:/app/data
