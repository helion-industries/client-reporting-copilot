name: Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: openclaw
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: /opt/openclaw/.openclaw/workspace/scripts/deploy-client-reporting-copilot.sh
