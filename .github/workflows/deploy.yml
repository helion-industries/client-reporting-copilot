name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 207.244.231.131
          username: openclaw
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/openclaw/.openclaw/workspace/client-reporting-copilot
            git pull origin main
            npm install --production --silent
            sudo systemctl restart client-reporting.service
            echo "Deployed client-reporting-copilot at $(date)"
